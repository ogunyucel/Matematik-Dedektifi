<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matematik Dedektifi</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
        }
        .container { 
            background: white; padding: 30px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); text-align: center; width: 90%; max-width: 400px; 
        }
        h1 { color: #333; margin-bottom: 20px; }
        
        button { 
            padding: 12px 25px; font-size: 18px; font-weight: bold; border: none; 
            border-radius: 10px; cursor: pointer; transition: 0.3s; margin: 10px;
        }
        .btn-primary { background-color: #4CAF50; color: white; width: 100%; font-size: 22px; padding: 15px;}
        .btn-primary:hover { background-color: #45a049; transform: scale(1.05); }
        
        .level-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn-level { background-color: #3498db; color: white; padding: 15px 0; font-size: 20px; }
        .btn-level:hover { background-color: #2980b9; transform: translateY(-3px); }
        
        .options { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .btn-option { background-color: #f1f1f1; 
         color: #333; 
         border: 2px solid #ddd; 
         width: 48%; 
         height: 60px; 
         font-size: 22px; 
         white-space: nowrap;}
        .btn-option:hover { background-color: #e2e2e2; }
        
        .correct { background-color: #2ecc71 !important; color: white !important; border-color: #27ae60 !important; }
        .wrong { background-color: #e74c3c !important; color: white !important; border-color: #c0392b !important; }
        
        .hidden { display: none !important; }

        #score-board { margin-bottom: 20px; background: #f8f9fa; padding: 10px; border-radius: 10px; }
        .main-stats { font-size: 18px; font-weight: bold; color: #2c3e50; margin-bottom: 8px; }
        .sub-stats { font-size: 16px; font-weight: bold; }
        .text-correct { color: #27ae60; }
        .text-wrong { color: #c0392b; }

        #question { font-size: 50px; font-weight: bold; color: #2c3e50; margin: 20px 0; }
        #message { height: 24px; font-weight: bold; margin-top: 15px; color: #555; }
    </style>
</head>
<body>

<div id="start-screen" class="container">
    <h1> Matematik Dedektifi 🔍</h1>
    <p>Sonucu gör, doğru işlemi bul!</p>
    <button class="btn-primary" onclick="showScreen('level-screen')">Oyuna Başla</button>
</div>

<div id="level-screen" class="container hidden">
    <h1>Seviye Seç</h1>
    <p>Hangi çarpım tablosuyla oynamak istersin?</p>
    <div class="level-grid" id="levels"></div>
    <button style="margin-top: 20px; background: #95a5a6; color: white; width: 100%;" onclick="showScreen('start-screen')">Geri Dön</button>
</div>

<div id="game-screen" class="container hidden">
    <div id="score-board">
        <div class="main-stats">Skor: <span id="score">0</span> | Seviye: <span id="current-level-text">1</span>'ler</div>
        <div class="sub-stats">
            <span class="text-correct">✔️ Doğru: <span id="correct-count">0</span></span> | 
            <span class="text-wrong">❌ Yanlış: <span id="wrong-count">0</span></span>
        </div>
    </div>

    <h1 id="question">--</h1>
    
    <div class="options">
        <button id="opt1" class="btn-option" onclick="checkAnswer(this)"></button>
        <button id="opt2" class="btn-option" onclick="checkAnswer(this)"></button>
    </div>
    <p id="message"></p>
    <button style="margin-top: 20px; background: #e67e22; color: white; width: 100%;" onclick="endGame()">Oyunu Bitir</button>
</div>

<script>
    let currentLevel = 1; 
    let correctAnswerText = ""; 
    let score = 0;
    let correctCount = 0; 
    let wrongCount = 0;   
    let isClickable = true; 

    function showScreen(screenId) {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('level-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById(screenId).classList.remove('hidden');
    }

    function generateLevelButtons() {
        const levelsDiv = document.getElementById('levels');
        for (let i = 1; i <= 9; i++) {
            let btn = document.createElement('button');
            btn.innerText = i;
            btn.className = "btn-level";
            btn.onclick = () => startLevel(i);
            levelsDiv.appendChild(btn);
        }
    }
    generateLevelButtons(); 

    function startLevel(level) {
        currentLevel = level;
        score = 0;
        correctCount = 0; 
        wrongCount = 0;   
        
        updateScore();
        document.getElementById('current-level-text').innerText = level;
        showScreen('game-screen');
        askQuestion();
    }

    function askQuestion() {
        isClickable = true;
        document.getElementById("message").innerText = "";
        
        const btn1 = document.getElementById("opt1");
        const btn2 = document.getElementById("opt2");
        btn1.className = "btn-option"; 
        btn2.className = "btn-option";

        // 1 ile 10 arası rastgele bir sayı seçiyoruz
        const randomNum = Math.floor(Math.random() * 10) + 1;
        
        // Ekrana yazdıracağımız büyük hedef sonuç
        const targetResult = currentLevel * randomNum;
        document.getElementById("question").innerText = targetResult;
        
        // Doğru şıkkın metni (Örn: "5 x 4")
        correctAnswerText = `${currentLevel} x ${randomNum}`;
        
        // Şaşırtma şıkkı oluşturuyoruz (doğru sayının 1 eksiği veya 1 fazlası)
        let fakeNum = randomNum + (Math.random() > 0.5 ? 1 : -1);
        if(fakeNum <= 0) fakeNum = 2; // Eğer sayı sıfıra düşerse 2 yap
        if(fakeNum === randomNum) fakeNum = randomNum + 1; // Güvenlik önlemi
        
        // Yanlış şıkkın metni 
        let fakeAnswerText = `${currentLevel} x ${fakeNum}`;

        // Şıkları butonlara rastgele yerleştir
        if (Math.random() > 0.5) {
            btn1.innerText = correctAnswerText; 
            btn2.innerText = fakeAnswerText;
        } else {
            btn1.innerText = fakeAnswerText; 
            btn2.innerText = correctAnswerText;
        }
    }

    function checkAnswer(btn) {
        if (!isClickable) return; 
        isClickable = false;

        // Tıklanan butonun üzerindeki yazı ile doğru cevabı karşılaştırıyoruz
        if (btn.innerText === correctAnswerText) {
            btn.classList.add("correct");
            document.getElementById("message").innerText = "Harika! 🎉";
            document.getElementById("message").style.color = "#27ae60";
            score += 10;
            correctCount++; 
            updateScore();
            setTimeout(askQuestion, 1000); 
        } else {
            btn.classList.add("wrong");
            document.getElementById("message").innerText = `Eyvah! Doğrusu ${correctAnswerText} olacaktı.`;
            document.getElementById("message").style.color = "#c0392b";
            wrongCount++; 
            updateScore();
            setTimeout(askQuestion, 1500); 
        }
    }

    function updateScore() {
        document.getElementById('score').innerText = score;
        document.getElementById('correct-count').innerText = correctCount;
        document.getElementById('wrong-count').innerText = wrongCount;
    }

    function endGame() {
        alert("Oyun bitti!\n\nToplam Skorun: " + score + "\nDoğru Sayısı: " + correctCount + "\nYanlış Sayısı: " + wrongCount);
        showScreen('level-screen'); 
    }

</script>
</body>
</html>
